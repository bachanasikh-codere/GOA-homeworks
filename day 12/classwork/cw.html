<!-- 1)ახსენით როგორია html ის მთავარი სტრუქტურა
DOCTYPE html — მიუთითებს, რომ დოკუმენტი HTML5-ია.
html — HTML დოკუმენტის მთავარი ტეგი.
head — შეიცავს ინფორმაციას გვერდის შესახებ :სათაური, მეტამონაცემები და ა.შ.
title — ბრაუზერის ჩანართში გამოჩენილი სათაური.
body — გვერდზე ხილული შიგთავსი; ტექსტი, სურათები, ღილაკები და სხვა.
2)საიტზე დაამატეთ 2 ფოტო და გაუწერეთ თავისი ატრიბუტები (src, width, height, alt)
<!DOCTYPE html>
<html>
<head>
    <title>ფ</title>
</head>
<body>

    <img src="cat.jpg" width="300" height="200" alt="">

    <img src="dog.jpg" width="300" height="200" alt="">

</body>
</html>
3)ახსენით  რატომაა  საჭირო html ის სტრუქტურა, და შექმენით 1 საიტი html სტრუქტურის გამოყენებით -->
<!DOCTYPE html>
<html>
<head>
    <title>a</title>
</head>
<body>

    <h1>მ</h1>

    <p>ე</p>

    <img src="nature.jpg" width="400" height="250" alt="ბუნების ფოტო">

</body>
</html>

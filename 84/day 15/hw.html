<!DOCTYPE html>
<html>
<head>
    <title>Forms</title>
</head>

<body>

    <h1>სარეგისტრაციო ფორმა</h1>

    <form>

        <label for="fullname">სრული სახელი:</label>
        <input type="text" id="fullname" name="fullname" placeholder="შეიყვანეთ სრული სახელი" required>
        <br><br>

        <label for="email">ემაილი:</label>
        <input type="email" id="email" name="email" placeholder="შეიყვანეთ ემაილი" required>
        <br><br>

        <label for="password">პაროლი:</label>
        <input type="password" id="password" name="password" placeholder="შეიყვანეთ პაროლი" required minlength="6">
        <br><br>

        <input type="submit" value="რეგისტრაცია">

    </form>

    <hr>

    <h1>Input Types</h1>

    <label>text:</label>
    <input type="text">
    <br><br>

    <label>password:</label>
    <input type="password">
    <br><br>

    <label>email:</label>
    <input type="email">
    <br><br>

    <label>number:</label>
    <input type="number">
    <br><br>

    <label>date:</label>
    <input type="date">
    <br><br>

    <label>time:</label>
    <input type="time">
    <br><br>

    <label>color:</label>
    <input type="color">
    <br><br>

    <label>checkbox:</label>
    <input type="checkbox">
    <br><br>

    <label>radio:</label>
    <input type="radio">
    <br><br>

    <label>range:</label>
    <input type="range">
    <br><br>

    <label>file:</label>
    <input type="file">
    <br><br>

    <label>submit:</label>
    <input type="submit">
    <br><br>

    <label>reset:</label>
    <input type="reset">
    <br><br>

    <label>button:</label>
    <input type="button" value="Click">

</body>
</html>

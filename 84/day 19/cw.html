<!-- 1) ჩამოტვირთული ვიდეო (video + source) -->

<!DOCTYPE html>
<html>

<head>
    <title>Video Example</title>
</head>

<body>

    <h1>Downloaded Video</h1>

    <video width="400" controls>
        <source src="video.mp4" type="video/mp4">
    </video>

</body>

</html>

<!-- 2) YouTube ვიდეო iframe-ით -->

<!DOCTYPE html>
<html>

<head>
    <title>YouTube Video</title>
</head>

<body>

    <h1>YouTube Video</h1>

    <iframe width="560" height="315" src="https://www.youtube.com/embed/dQw4w9WgXcQ" title="YouTube video player"
        frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
        allowfullscreen>
    </iframe>

</body>

</html>

<!-- 3) ჩამოტვირთული აუდიო (audio + source) -->

<!DOCTYPE html>
<html>

<head>
    <title>Audio Example</title>
</head>

<body>

    <h1>Audio File</h1>

    <audio controls>
        <source src="audio.mp3" type="audio/mpeg">
    </audio>

</body>

</html>

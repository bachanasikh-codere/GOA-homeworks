<!-- 2) video, audio, source, type თეგების დანიშნულება -->

<!-- video:
გამოიყენება საიტზე ვიდეოს გამოსატანად -->

<!-- audio:
გამოიყენება საიტზე ხმის (აუდიოს) დასაკრავად -->

<!-- source:
გამოიყენება video და audio თეგებში ფაილის წყაროს მისათითებლად -->

<!-- type:
მიუთითებს ფაილის ტიპს (მაგ: video/mp4, audio/mp3) -->


<!-- 3) video თეგის ატრიბუტები -->

<!-- controls:
აჩენს play, pause, volume ღილაკებს -->

<!-- autoplay:
ვიდეო ავტომატურად იწყებს დაკვრას -->

<!-- muted:
ხმა ითიშება ავტომატურად -->

<!-- loop:
ვიდეო იწყება თავიდან დასრულების შემდეგ -->

<!-- width:
ვიდეოს სიგანე -->

<!-- height:
ვიდეოს სიმაღლე -->


<!-- 4) ვიდეო საიტი (controls-ით) -->

<!DOCTYPE html>
<html>

<head>
    <title>Video Site</title>
</head>

<body>

    <h1>My Video</h1>

    <video width="300" controls>
        <source src="video.mp4" type="video/mp4">
    </video>

</body>

</html>

<!-- 5) მანქანის ვიდეო (autoplay, muted, loop, controls გარეშე) -->

<!DOCTYPE html>
<html>
<head>
    <title>Car Video</title>
</head>

<body>

<h1>My Favorite Car</h1>

<video width="400" autoplay muted loop>
    <source src="car.mp4" type="video/mp4">
</video>

</body>
</html>

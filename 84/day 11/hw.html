<!-- 1) კომენტარების სახით ახსენით რისთვის ვიყენებთ a თეგს და რა დანიშნულება აქვს href ატრიბუტს? -->

<!-- პასუხი:
<a> თეგი გამოიყენება ლინკების (ბმულების) შესაქმნელად.
href ატრიბუტი მიუთითებს მისამართს (URL), თუ სად უნდა გადავიდეს მომხმარებელი ლინკზე დაჭერისას.
-->



<!-- 2) კომენტარების სახით ახსენით რა არის hyperText და hyperLink? -->

<!-- პასუხი:
HyperText არის ტექსტი, რომელიც შეიცავს ბმულებს (ლინკებს) სხვა გვერდებზე გადასასვლელად.
HyperLink არის თვითონ ბმული (ლინკი, რომელზეც დაჭერისას გადავდივართ სხვა გვერდზე.
-->



<!-- 3) კომენტარების სახით ახსენით როგორი სახით list-ები გვაქვს html-ში. -->

<!-- პასუხი:
HTML-ში გვაქვს 3 ტიპის სია:
1) <ol> - დალაგებული სია  აქვს ნომრები
2) <ul> - დაულაგებელი სია  -> აქვს წერტილები
3) <li> - სიის ელემენტი 
-->



<!-- 4) შექმენით დალაგებული სია (დღის განრიგი) -->

<ol>
    <li>გაღვიძება</li>
    <li>სწავლა</li>
    <li>ვარჯიში</li>
    <li>პროგრამირება</li>
    <li>დასვენება</li>
</ol>



<!-- 5) შექმენით დაულაგებელი სია (პროგრამირების ენები) -->

<ul>
    <li>Python</li>
    <li>JavaScript</li>
    <li>Java</li>

<!DOCTYPE html>
<html>

<head>
    <title>Paragraphs and Buttons Styling</title>
</head>

<body>

    <h1>Styled Paragraphs and Buttons</h1>

    <p style="color: blue; font-size: 18px; background-color: lightgray;">Paragraph 1</p>
    <button style="color: white; font-size: 16px; background-color: blue;">Button 1</button>

    <p style="color: green; font-size: 20px; background-color: #f0f8ff;">Paragraph 2</p>
    <button style="color: white; font-size: 18px; background-color: green;">Button 2</button>

    <p style="color: red; font-size: 16px; background-color: #ffe4e1;">Paragraph 3</p>
    <button style="color: white; font-size: 16px; background-color: red;">Button 3</button>

    <p style="color: purple; font-size: 22px; background-color: #ffffe0;">Paragraph 4</p>
    <button style="color: white; font-size: 20px; background-color: purple;">Button 4</button>

    <p style="color: brown; font-size: 18px; background-color: #e6e6fa;">Paragraph 5</p>
    <button style="color: white; font-size: 18px; background-color: brown;">Button 5</button>

    <br><br>

    <p style="color: orange; font-size: 18px; background-color: #f5f5dc;">Paragraph 6</p>
    <button style="color: white; font-size: 16px; background-color: orange;">Button 6</button>

    <p style="color: teal; font-size: 20px; background-color: #e0ffff;">Paragraph 7</p>
    <button style="color: white; font-size: 18px; background-color: teal;">Button 7</button>

    <p style="color: navy; font-size: 16px; background-color: #f0f8ff;">Paragraph 8</p>
    <button style="color: white; font-size: 16px; background-color: navy;">Button 8</button>

    <p style="color: maroon; font-size: 22px; background-color: #ffe4b5;">Paragraph 9</p>
    <button style="color: white; font-size: 20px; background-color: maroon;">Button 9</button>

    <p style="color: olive; font-size: 18px; background-color: #fafad2;">Paragraph 10</p>
    <button style="color: white; font-size: 18px; background-color: olive;">Button 10</button>

</body>

</html>

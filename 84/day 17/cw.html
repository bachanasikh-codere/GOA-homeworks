<!DOCTYPE html>
<html>

<head>
    <title>Level 17 Form</title>
</head>

<body>

    <h2>Login Form</h2>

    <form>

        <label>Username:</label>
        <input type="text" name="username">
        <br><br>

        <label>Password:</label>
        <input type="password" name="password">
        <br><br>

        <label>City of Employment:</label>
        <input type="text" name="city">
        <br><br>

        <label>Web server:</label>
        <select name="server">
            <option value="server1">— Choose a server —</option>
            <option value="apache">Apache</option>
            <option value="nginx">Nginx</option>
        </select>

        <br><br>

        <label>Please specify your role:</label>
        <br>

        <input type="radio" name="role" value="admin"> Admin
        <br>

        <input type="radio" name="role" value="engineer"> Engineer
        <br>

        <input type="radio" name="role" value="manager"> Manager
        <br>

        <input type="radio" name="role" value="guest"> Guest

        <br><br>

        <label>Single Sign-on to the following:</label>
        <br>

        <input type="checkbox" name="mail"> Mail
        <br>

        <input type="checkbox" name="payroll"> Payroll
        <br>

        <input type="checkbox" name="selfservice"> Self-service

        <br><br>

        <button type="submit">Login</button>
        <button type="reset">Reset</button>

    </form>

</body>

</html>

<!-- 1)რა განსხვავება არის id და class შორის?
id-s რომელსაც ვიყენებთ მხოლოდ ერთი კონკრეტული ელემენტისთვის. ერთ გვერდზე ერთი და იგივე id მეორედ არ უნდა გამოვიყენოთ.
class გამოიყენება მაშინ, როცა რამდენიმე ელემენტს გვინდა ერთნაირი დიზაინი ან სტილი მივცეთ. ერთი და იგივე class შეიძლება ბევრ ელემენტს ჰქონდეს.

2)როგორ შეიძლება მივწდეთ id და class,css-ში?
id-ს CSS-ში მივმართავთ # სიმბოლოთი.
მაგალითად:
#title {
    color: red;
}
class-ს CSS-ში მივმართავთ . სიმბოლოთი.
მაგალითად:
.text {
    color: blue;
}

<!-- 1) შექმენით ქვეეყნის შესარჩევი drop down menu 10 ქვეყნით -->

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
 
    <form>
        <label for="country">Select country:</label>
        <select id="country">
            <option value="GE">Georgia</option>
            <option value="TU">Turkey</option>
            <option value="GER" selected>Germany</option>
            <option value="in">india</option>
            <option value="ru">rusha</option> 
            <option value="uk">ukraina</option>
            <option value="ch">chaina</option>
            <option value="ta">tailand</option>
            <option value="us">usa</option>
            <option value="ja">japen</option>

        </select>
        <input type="submit">
    </form>
</body>
</html>

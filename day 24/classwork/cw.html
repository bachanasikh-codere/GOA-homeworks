<!-- 1) ახსენით რაში გამოიყენეება თითოეული ატრიბუტი
autoplay-როცა საიტი ჩაიტვირთება ვიდეო ავტომატურად ჩაირთვება
controls-ამაატებს ვიდეოს სამართო ღილაკებს და ვეელებს გადიდება, ხმის აწევა, ხმის ჩაწევა, გადახვეევა.
muted-როცა საიტი ჩაიტვირთება, ვიდეო იქნება დამიუძთებული
loop-როცა ვიდეო დამთავრდება ახლიდან დაიწყება

2) გადმოიწერეთ თქენი საყვარელი ფილმის trailer ი ან თქვენი საყვარელი სიმღერის ვიდდეო, და დაამატეთ იგი ვებსაიტზე, ისე რომ რომ ჩაიტვირთება ვებსაიტი ავტომატურად ჩაირთოს და იყოს დამიუთებული -->


<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>trailer</title>
</head>
<body>

    <center>
        <video src="https://www.youtube.com/watch?v=a1hl3_Zgchc&list=RDa1hl3_Zgchc&start_radio=1" controls autoplay loop muted></video>
    </center>
</body>
</html>


<!-- 2) გადმოიწერეთ თქენი საყვარელი სიმღერის აუდიო  ( mp3 ) და დაამატეთ საიტზე, გაუწერეთ controls muted loop -->


<!DOCTYPE html>
<html lang="en">

</html>
